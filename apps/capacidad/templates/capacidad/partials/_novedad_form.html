<tr id="novedad-{{ n.id }}" class="nov-fila-edicion">
  <td colspan="6">
    <div id="nov-edit-{{ n.id }}" class="nov-form">
      {{ form.tipo }}
      {{ form.signo }}
      {{ form.citas_afectadas }}
      {{ form.fecha }}
      {{ form.descripcion }}
      <button class="btn primary" type="button"
              hx-post="{% url 'capacidad:editar_novedad' n.id %}"
              hx-include="#nov-edit-{{ n.id }} [name]"
              hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
              hx-target="#modulo-novedades" hx-swap="innerHTML">Guardar</button>
      <button class="btn" type="button"
              hx-get="{% url 'capacidad:fila_novedad' n.id %}"
              hx-target="#novedad-{{ n.id }}" hx-swap="outerHTML">Cancelar</button>
    </div>
    {% if form.errors %}
      <div style="color:var(--danger); font-size:.8rem; margin-top:.4rem;">
        {% for f, e in form.errors.items %}{{ f }}: {{ e|join:", " }} {% endfor %}
      </div>
    {% endif %}
  </td>
</tr>
